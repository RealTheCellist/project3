name: Data Retention

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "run without deleting files"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  retention:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run retention job
        shell: bash
        run: |
          DRY="${{ github.event.inputs.dry_run }}"
          if [ -z "$DRY" ]; then DRY="true"; fi
          if [ "$DRY" = "true" ]; then
            python scripts/data_retention_job.py --dry-run
          else
            python scripts/data_retention_job.py
          fi

